<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>从Word导入单词 - PDM系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <div class="content-section">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div class="d-flex align-items-center gap-3">
                    <a href="{% url 'pdm:word_practice' %}" class="btn btn-outline-secondary">← 返回背单词</a>
                    <h2>从Word文档导入单词</h2>
                </div>
            </div>
            
            <p>请上传Word文档(.docx)，系统将解析文档中的表格并导入单词。</p>
            <p><strong>表格格式要求：</strong></p>
            <ul>
                <li>表头必须包含：序号、英文、音标、词性、中文（顺序不限）</li>
                <li>数据从第二行开始</li>
                <li>支持文档中包含多个表格</li>
            </ul>
            
            {% if error %}
            <div class="alert alert-danger">
                {{ error }}
            </div>
            {% endif %}
            
            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="docx_file" class="form-label">选择Word文档</label>
                    <input type="file" class="form-control" id="docx_file" name="docx_file" accept=".docx" required>
                </div>
                <button type="submit" class="btn btn-primary">上传导入</button>
                <a href="{% url 'pdm:word_import' %}" class="btn btn-secondary">Excel导入</a>
            </form>
            
            <div class="mt-4 p-3 bg-light rounded">
                <h4>📋 示例表格格式：</h4>
                <table class="table table-sm table-bordered">
                    <thead>
                        <tr>
                            <th>序号</th>
                            <th>英文</th>
                            <th>音标</th>
                            <th>词性</th>
                            <th>中文</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>1</td>
                            <td>apple</td>
                            <td>/ˈæpl/</td>
                            <td>n.</td>
                            <td>苹果</td>
                        </tr>
                        <tr>
                            <td>2</td>
                            <td>beautiful</td>
                            <td>/ˈbjuːtɪfl/</td>
                            <td>adj.</td>
                            <td>美丽的</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
