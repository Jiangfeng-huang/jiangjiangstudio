<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>导入结果 - PDM系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <div class="content-section">
            <h2>导入结果</h2>
            
            <div class="alert alert-success">
                <strong>成功导入:</strong> {{ success_count }} 个单词
            </div>
            
            {% if error_count > 0 %}
            <div class="alert alert-danger">
                <strong>导入失败:</strong> {{ error_count }} 个单词
            </div>
            
            <div class="mb-3">
                <h4>错误详情:</h4>
                <ul class="list-group">
                    {% for error in errors %}
                    <li class="list-group-item list-group-item-danger">{{ error }}</li>
                    {% endfor %}
                </ul>
            </div>
            {% endif %}
            
            <div class="mt-3">
                <a href="{% url 'pdm:word_import' %}" class="btn btn-primary">继续导入</a>
                <a href="{% url 'pdm:word_list' %}" class="btn btn-secondary">查看单词列表</a>
                <a href="{% url 'pdm:word_practice' %}" class="btn btn-success">开始背单词</a>
            </div>
        </div>
    </div>
</body>
</html>
